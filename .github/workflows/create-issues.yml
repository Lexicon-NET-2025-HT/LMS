name: Create Backlog Issues

on:
  workflow_dispatch:
    inputs:
      sprint:
        description: 'Which issues to create?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sprint-1
          - sprint-2
          - backlog

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "backlog"            --color "0075ca" --description "Product backlog item"         --repo $REPO || true
          gh label create "sprint-1"           --color "e4e669" --description "Sprint 1 items"               --repo $REPO || true
          gh label create "sprint-2"           --color "d93f0b" --description "Sprint 2 items"               --repo $REPO || true
          gh label create "future"             --color "cccccc" --description "Future sprint items"           --repo $REPO || true
          gh label create "user-story"         --color "bfd4f2" --description "User story"                   --repo $REPO || true
          gh label create "authentication"     --color "5319e7" --description "Auth related"                 --repo $REPO || true
          gh label create "course-management"  --color "006b75" --description "Course management"            --repo $REPO || true
          gh label create "lesson-management"  --color "0e8a16" --description "Lesson management"            --repo $REPO || true
          gh label create "enrollment"         --color "1d76db" --description "Enrollment features"          --repo $REPO || true
          gh label create "assignments"        --color "e99695" --description "Assignment features"          --repo $REPO || true
          gh label create "grading"            --color "f9d0c4" --description "Grading features"             --repo $REPO || true
          gh label create "progress-tracking"  --color "c5def5" --description "Progress tracking"           --repo $REPO || true
          gh label create "admin"              --color "b60205" --description "Admin features"               --repo $REPO || true
          gh label create "notifications"      --color "fef2c0" --description "Notifications"               --repo $REPO || true
          gh label create "certificates"       --color "0052cc" --description "Certificate features"        --repo $REPO || true
          gh label create "communication"      --color "e4e669" --description "Communication features"      --repo $REPO || true
          gh label create "search"             --color "fbca04" --description "Search features"             --repo $REPO || true
          gh label create "dashboard"          --color "84b6eb" --description "Dashboard features"          --repo $REPO || true

      # ──────────────────────────────────────────
      # SPRINT 1
      # ──────────────────────────────────────────

      - name: "[US-01] User Registration"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-01] User Registration" \
            --body "## User Story
          **As a** student or instructor,
          **I want to** register with email and password,
          **So that** I can access the platform.

          ## Acceptance Criteria
          - [ ] Email and password are required fields
          - [ ] Email must be unique in the system
          - [ ] Password minimum 8 characters, must include a number
          - [ ] Confirmation email sent on successful registration
          - [ ] Validation errors shown inline

          **Story Points:** 5" \
            --label "backlog,sprint-1,authentication,user-story" \
            --repo $REPO

      - name: "[US-02] User Login"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-02] User Login" \
            --body "## User Story
          **As a** registered user,
          **I want to** log in with my credentials,
          **So that** I can access my dashboard.

          ## Acceptance Criteria
          - [ ] Login with email and password
          - [ ] Redirect to role-based dashboard after login
          - [ ] Show error on invalid credentials
          - [ ] 'Remember me' checkbox supported
          - [ ] Lockout after 5 failed attempts

          **Story Points:** 5" \
            --label "backlog,sprint-1,authentication,user-story" \
            --repo $REPO

      - name: "[US-03] User Logout"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-03] User Logout" \
            --body "## User Story
          **As a** logged-in user,
          **I want to** log out securely,
          **So that** my session is ended safely.

          ## Acceptance Criteria
          - [ ] Logout button available on all pages
          - [ ] Session is cleared on logout
          - [ ] Redirected to login page after logout
          - [ ] Cannot access protected pages after logout

          **Story Points:** 2" \
            --label "backlog,sprint-1,authentication,user-story" \
            --repo $REPO

      - name: "[US-04] Role Assignment"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-04] Role Assignment (Student / Instructor / Admin)" \
            --body "## User Story
          **As an** admin,
          **I want to** assign roles to users,
          **So that** permissions are correctly applied.

          ## Acceptance Criteria
          - [ ] Three roles: Student, Instructor, Admin
          - [ ] Admin can change any user's role
          - [ ] Role is displayed on user profile
          - [ ] Role-based navigation menu shown

          **Story Points:** 8" \
            --label "backlog,sprint-1,authentication,user-story" \
            --repo $REPO

      - name: "[US-05] View User Profile"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-05] View User Profile" \
            --body "## User Story
          **As a** user,
          **I want to** view and edit my profile,
          **So that** my information is up to date.

          ## Acceptance Criteria
          - [ ] Profile shows name, email, role, avatar
          - [ ] User can update name and avatar
          - [ ] Changes saved with success message
          - [ ] Email change requires re-verification

          **Story Points:** 5" \
            --label "backlog,sprint-1,user-story" \
            --repo $REPO

      - name: "[US-06] Create a Course"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-06] Create a Course" \
            --body "## User Story
          **As an** instructor,
          **I want to** create a new course,
          **So that** students can enroll and learn.

          ## Acceptance Criteria
          - [ ] Fields: title, description, category, thumbnail
          - [ ] Course saved as Draft by default
          - [ ] Instructor can publish or unpublish the course
          - [ ] Course appears in course catalog when published

          **Story Points:** 8" \
            --label "backlog,sprint-1,course-management,user-story" \
            --repo $REPO

      - name: "[US-07] Edit and Delete a Course"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-07] Edit and Delete a Course" \
            --body "## User Story
          **As an** instructor,
          **I want to** edit or delete my courses,
          **So that** I can keep content up to date.

          ## Acceptance Criteria
          - [ ] Instructor can edit all course fields
          - [ ] Delete requires confirmation dialog
          - [ ] Cannot delete course with active enrollments
          - [ ] Changes reflected immediately in catalog

          **Story Points:** 5" \
            --label "backlog,sprint-1,course-management,user-story" \
            --repo $REPO

      - name: "[US-08] Browse Course Catalog"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-08] Browse Course Catalog" \
            --body "## User Story
          **As a** student,
          **I want to** browse available courses,
          **So that** I can find courses to enroll in.

          ## Acceptance Criteria
          - [ ] List of all published courses shown
          - [ ] Filter by category and keyword search
          - [ ] Each card shows title, instructor, thumbnail
          - [ ] Pagination or infinite scroll supported

          **Story Points:** 8" \
            --label "backlog,sprint-1,course-management,user-story" \
            --repo $REPO

      - name: "[US-09] Enroll in a Course"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-09] Enroll in a Course" \
            --body "## User Story
          **As a** student,
          **I want to** enroll in a course,
          **So that** I can start learning.

          ## Acceptance Criteria
          - [ ] Enroll button on course detail page
          - [ ] Confirmation message on successful enrollment
          - [ ] Course appears in My Courses after enrollment
          - [ ] Cannot enroll in same course twice

          **Story Points:** 8" \
            --label "backlog,sprint-1,enrollment,user-story" \
            --repo $REPO

      - name: "[US-10] View My Enrolled Courses"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-10] View My Enrolled Courses" \
            --body "## User Story
          **As a** student,
          **I want to** see all courses I'm enrolled in,
          **So that** I can track my learning.

          ## Acceptance Criteria
          - [ ] Dashboard shows enrolled courses
          - [ ] Shows progress percentage per course
          - [ ] Quick link to continue last lesson
          - [ ] Sorted by last accessed

          **Story Points:** 5" \
            --label "backlog,sprint-1,enrollment,user-story" \
            --repo $REPO

      # ──────────────────────────────────────────
      # SPRINT 2
      # ──────────────────────────────────────────

      - name: "[US-11] Add Lessons to a Course"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-11] Add Lessons to a Course" \
            --body "## User Story
          **As an** instructor,
          **I want to** add lessons to my course,
          **So that** students have structured content to follow.

          ## Acceptance Criteria
          - [ ] Lessons have title, content (rich text), order number
          - [ ] Instructor can reorder lessons via drag-and-drop
          - [ ] Support for video URL embedding
          - [ ] Lesson saved as Draft or Published

          **Story Points:** 8" \
            --label "backlog,sprint-2,lesson-management,user-story" \
            --repo $REPO

      - name: "[US-12] View Lesson Content"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-12] View Lesson Content" \
            --body "## User Story
          **As a** student,
          **I want to** view lesson content,
          **So that** I can learn the material.

          ## Acceptance Criteria
          - [ ] Lessons displayed in order
          - [ ] Mark lesson as complete button
          - [ ] Navigation to next/previous lesson
          - [ ] Progress bar updated after completion

          **Story Points:** 5" \
            --label "backlog,sprint-2,lesson-management,user-story" \
            --repo $REPO

      - name: "[US-13] Track Lesson Progress"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-13] Track Lesson Progress" \
            --body "## User Story
          **As a** student,
          **I want to** track which lessons I have completed,
          **So that** I can see how far I have progressed.

          ## Acceptance Criteria
          - [ ] Completed lessons marked with checkmark
          - [ ] Overall course progress shown as percentage
          - [ ] Progress persisted across sessions
          - [ ] Progress visible to instructor

          **Story Points:** 5" \
            --label "backlog,sprint-2,progress-tracking,user-story" \
            --repo $REPO

      - name: "[US-14] Create Assignments"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-14] Create Assignments" \
            --body "## User Story
          **As an** instructor,
          **I want to** create assignments for a course,
          **So that** I can assess student understanding.

          ## Acceptance Criteria
          - [ ] Assignment has title, description, due date, max score
          - [ ] Linked to a specific course
          - [ ] Students notified when assignment is created
          - [ ] Instructor can edit or delete assignment

          **Story Points:** 8" \
            --label "backlog,sprint-2,assignments,user-story" \
            --repo $REPO

      - name: "[US-15] Submit Assignment"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-15] Submit Assignment" \
            --body "## User Story
          **As a** student,
          **I want to** submit my assignment,
          **So that** my instructor can review it.

          ## Acceptance Criteria
          - [ ] Text submission and/or file upload supported
          - [ ] Cannot submit after due date
          - [ ] Submission timestamp recorded
          - [ ] Confirmation message shown after submission

          **Story Points:** 5" \
            --label "backlog,sprint-2,assignments,user-story" \
            --repo $REPO

      - name: "[US-16] Grade Assignment Submissions"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-16] Grade Assignment Submissions" \
            --body "## User Story
          **As an** instructor,
          **I want to** grade student submissions,
          **So that** students receive feedback and a score.

          ## Acceptance Criteria
          - [ ] View all submissions per assignment
          - [ ] Enter numeric score and written feedback
          - [ ] Grade saved and visible to student
          - [ ] Average score shown in instructor dashboard

          **Story Points:** 8" \
            --label "backlog,sprint-2,grading,user-story" \
            --repo $REPO

      - name: "[US-17] View Grades"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'sprint-2' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-17] View Grades" \
            --body "## User Story
          **As a** student,
          **I want to** view my grades,
          **So that** I can track my academic performance.

          ## Acceptance Criteria
          - [ ] Grades page shows all graded assignments
          - [ ] Shows score, max score, and feedback
          - [ ] GPA or average calculated and displayed
          - [ ] Ungraded submissions shown as Pending

          **Story Points:** 5" \
            --label "backlog,sprint-2,grading,user-story" \
            --repo $REPO

      # ──────────────────────────────────────────
      # FUTURE BACKLOG
      # ──────────────────────────────────────────

      - name: "[US-18] Course Completion Certificate"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'backlog' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-18] Course Completion Certificate" \
            --body "## User Story
          **As a** student,
          **I want to** receive a certificate when I complete a course,
          **So that** I can showcase my achievement.

          ## Acceptance Criteria
          - [ ] Certificate generated when all lessons complete and assignments passed
          - [ ] Certificate includes student name, course name, date
          - [ ] Downloadable as PDF
          - [ ] Shareable link generated

          **Story Points:** 8" \
            --label "backlog,future,certificates,user-story" \
            --repo $REPO

      - name: "[US-19] Discussion Forum per Course"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'backlog' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-19] Discussion Forum per Course" \
            --body "## User Story
          **As a** student or instructor,
          **I want to** post and reply in a course discussion forum,
          **So that** we can communicate within the course.

          ## Acceptance Criteria
          - [ ] Each course has its own forum
          - [ ] Students and instructors can post and reply
          - [ ] Posts sorted by newest first
          - [ ] Instructor can pin or delete posts

          **Story Points:** 8" \
            --label "backlog,future,communication,user-story" \
            --repo $REPO

      - name: "[US-20] Email Notifications"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'backlog' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-20] Email Notifications" \
            --body "## User Story
          **As a** user,
          **I want to** receive email notifications for important events,
          **So that** I do not miss updates.

          ## Acceptance Criteria
          - [ ] Notify student on new assignment
          - [ ] Notify student when assignment is graded
          - [ ] Notify instructor on new submission
          - [ ] User can opt out from profile settings

          **Story Points:** 5" \
            --label "backlog,future,notifications,user-story" \
            --repo $REPO

      - name: "[US-21] Admin User Management"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'backlog' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-21] Admin User Management" \
            --body "## User Story
          **As an** admin,
          **I want to** view and manage all users,
          **So that** I can maintain the platform.

          ## Acceptance Criteria
          - [ ] Table of all users with search and filter
          - [ ] Admin can activate/deactivate accounts
          - [ ] Admin can reset passwords
          - [ ] Audit log of admin actions

          **Story Points:** 8" \
            --label "backlog,future,admin,user-story" \
            --repo $REPO

      - name: "[US-22] Admin Course Management"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'backlog' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-22] Admin Course Management" \
            --body "## User Story
          **As an** admin,
          **I want to** view and manage all courses,
          **So that** I can moderate platform content.

          ## Acceptance Criteria
          - [ ] Admin can view all courses regardless of instructor
          - [ ] Admin can unpublish any course
          - [ ] Admin can delete courses
          - [ ] Dashboard shows total courses, enrollments, active users

          **Story Points:** 5" \
            --label "backlog,future,admin,user-story" \
            --repo $REPO

      - name: "[US-23] Search Across Platform"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'backlog' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-23] Search Across Platform" \
            --body "## User Story
          **As a** user,
          **I want to** search for courses and lessons,
          **So that** I can quickly find what I need.

          ## Acceptance Criteria
          - [ ] Global search bar in navigation
          - [ ] Results show courses and lessons
          - [ ] Results highlight matching keyword
          - [ ] No results state handled gracefully

          **Story Points:** 5" \
            --label "backlog,future,search,user-story" \
            --repo $REPO

      - name: "[US-24] Student Dashboard with Analytics"
        if: ${{ github.event.inputs.sprint == 'all' || github.event.inputs.sprint == 'backlog' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[US-24] Student Dashboard with Analytics" \
            --body "## User Story
          **As a** student,
          **I want to** see an overview of my activity and progress,
          **So that** I stay motivated and on track.

          ## Acceptance Criteria
          - [ ] Shows enrolled courses and completion %
          - [ ] Upcoming assignment deadlines
          - [ ] Recent grades
          - [ ] Total hours spent learning

          **Story Points:** 5" \
            --label "backlog,future,dashboard,user-story" \
            --repo $REPO
